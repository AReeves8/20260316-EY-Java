spring:
    application: 
        name: rabbitmq-subscriber

    # configuring RabbitMQ
    rabbitmq:
        host: localhost
        port: 5672          # default port for RabbitMQ

server:
    port: 8084

eureka:
    client:
        service-url:
            defaultZone: http://localhost:8761/eureka
    instance:
        leaseRenewalIntervalInSeconds: 30


# custom properties to use for rabbit mq
exchanges:
    fanout: payment

queues:         # the subscriber also needs to know what queue to read from
    fanout: paymentQueue

routing-key: key1234        # password for rabbit mq exchanges
