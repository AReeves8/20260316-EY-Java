services:
  backend:
    build: 
      context: ./spring-data-jpa-intro
    ports:
      - "8080:8080"
    volumes:
      - api-logs:/app/logs  # put info that would be in /app/logs into the volume
    environment:
        # by default, spring first looks in the ENVIRONMENT for a logging file -> logging.file.name
      - LOGGING_FILE_NAME=/app/logs/spring-app.log    # telling spring boot where to write log files to in container
    networks:
      - movies-network

  frontend:
    build: 
      context: ./movies-app
    ports:
      - "4200:8080"
    depends_on:
      - backend
    networks:
      - movies-network

# creates a named volume managed by docker. will persist until the volume is removed. 
volumes:
  api-logs:
    driver: local

# creating custom network allows Docker to recognize services on the network by name
# allows for DNS resolution
networks:
  movies-network:
    driver: bridge
